spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/jobengine?forceBinaryTimeZone=true
    username: admin
    password: admin
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

logging:
  level:
    com.jobengine: DEBUG
    org.flywaydb: INFO